# Cross-system relationships
# Schema: {from: id, to: id, type: pipeline|shared-dependency|shared-model, description: string}
relationships:
  - from: "autocaption"
    to: "pinboard"
    type: "shared-dependency"
    description: "Both systems use Bun as their JavaScript/TypeScript runtime"
  - from: "autocaption"
    to: "pinboard"
    type: "shared-dependency"
    description: "Both systems use React 19 for UI rendering (Remotion compositions / web client)"
  - from: "autocaption"
    to: "pinboard"
    type: "shared-dependency"
    description: "Both systems use TypeScript with similar toolchain versions"
  - from: "scene-board"
    to: "pinboard"
    type: "shared-dependency"
    description: "Both systems use NanoBanana Pro (fal.ai) for image generation"
  - from: "scene-board"
    to: "autocaption"
    type: "shared-dependency"
    description: "Both systems use Remotion for rendering (SceneBoard for text scenes, autoCaption for captions)"
  - from: "scene-board"
    to: "pinboard"
    type: "shared-dependency"
    description: "Both systems use Bun as their JavaScript/TypeScript runtime"
  - from: "image-engine"
    to: "scene-board"
    type: "pipeline"
    relationship: "primary"
    description: "SOLE image transport: SceneBoard talks only to ImageEngine's HTTP API and omits the model so ImageEngine serves its default provider (Higgsfield GPT Image 2, with an internal gemini-2.5-flash-image fallback). The generated sheet is persisted to ImageEngine's gallery and downloaded to SceneBoard's outPath; reference sheets chain via gallery imageIds."
  - from: "image-engine"
    to: "pinboard"
    type: "shared-dependency"
    description: "Both systems provide image generation capabilities (ImageEngine via WisGate, Pinboard via fal.ai/Google AI)"
  - from: "higgsfield"
    to: "image-engine"
    type: "pipeline"
    relationship: "primary"
    description: "DEFAULT generation provider: ImageEngine shells out to the Higgsfield CLI (higgsfield generate create gpt_image_2 … --wait --json) as its default model (higgsfield-gpt-image-2), downloading the result into the standard provider pipeline and falling back to gemini-2.5-flash-image on failure. Environment prerequisite (global install + auth), not a package.json dependency. Centralized here so every system calling ImageEngine gets Higgsfield by default."
  - from: "prompt-writer"
    to: "scene-board"
    type: "pipeline"
    description: "PromptWriter provides centralized prompt engineering knowledge that SceneBoard references for GPT Image 2 composite-sheet / reference-sheet prompt generation and the storyboard-prompt-builder methodology"
  - from: "prompt-writer"
    to: "image-engine"
    type: "shared-dependency"
    description: "Both systems reference AI generation models — PromptWriter as the knowledge authority, ImageEngine as the execution gateway"
  - from: "moodboarder"
    to: "scene-board"
    type: "pipeline"
    description: "MoodBoarder feeds visual references that SceneBoard can use as Style Anchor input for storyboard scenes"
  - from: "moodboarder"
    to: "pinboard"
    type: "shared-dependency"
    description: "Both systems manage per-client visual reference collections in the same client/<c>/<d>/ folder convention"
  - from: "moodboarder"
    to: "instagram-scrapper"
    type: "shared-dependency"
    description: "Both systems use Playwright + cookies.json browser-login pattern for authenticated scraping"
  - from: "moodboarder"
    to: "autocaption"
    type: "shared-dependency"
    description: "Both systems use ffmpeg / ffprobe for media processing (autoCaption for audio, MoodBoarder for video keyframe extraction)"
  - from: "scrape-engine"
    to: "moodboarder"
    type: "pipeline"
    relationship: "optional"
    description: "OPT-IN scrape transport: MoodBoarder can route Pinterest harvesting through ScrapeEngine (StealthyFetcher + adaptive=True CSS) behind a flag; the existing Playwright cookies.json path remains the default and automatic fallback when ScrapeEngine throws ScrapingBlockedError/ScrapingDependencyError. Targets the documented video-markup-drift and cookie-rotation pain."
  - from: "scrape-engine"
    to: "instagram-scrapper"
    type: "shared-dependency"
    description: "Both perform authenticated scraping with cookies.json; instagram-scrapper is a future candidate to route through ScrapeEngine."
  - from: "image-engine"
    to: "post-board"
    type: "pipeline"
    relationship: "optional"
    description: "OPTIONAL cover-background transport: PostBoard's cover slide can pull a Higgsfield GPT Image 2 background through ImageEngine's HTTP API (:3002), reusing SceneBoard's image-client port. The default cover is a pure CSS riso composition, and that CSS fallback ALWAYS works — when :3002 is down PostBoard surfaces a clear message and keeps the editable CSS cover path intact."
  - from: "prompt-writer"
    to: "post-board"
    type: "pipeline"
    description: "PromptWriter provides the centralized prompt-engineering methodology PostBoard's cover-prompt.ts uses to compose the Higgsfield GPT Image 2 cover-background prompt (brand style mode + brief + riso rules, no in-frame text)."
  - from: "scene-board"
    to: "post-board"
    type: "shared-dependency"
    description: "PostBoard is modeled on SceneBoard — it ports SceneBoard's ImageEngine image-client verbatim in shape and shares the same client/<slug>/<system-slug>/ brand + output convention (projects live under client/dragonhearted_labs/post-board/<project>/)."

# Known failure patterns for accelerated diagnosis
# Schema: {id: fp-NNN, description: string, diagnosed: date, resolution: string, affects: [system-id]}
failure_patterns:
  - id: "fp-001"
    description: "Tmux teammates appear as anonymous sessions in observability — no team_name, teammate_name, or agent_type in SessionStart events"
    diagnosed: "2026-03-26"
    resolution: "Added detect_team_membership() to send_event.py that scans ~/.claude/teams/*/config.json and enriches SessionStart events with team_info (team_name, teammate_name, teammate_type, is_team_lead)"
    affects: ["observability"]
  - id: "fp-002"
    description: "TUI launcher CLI surface non-compliant with cli-ux-designer rubric — silent failures on unknown flags, no TTY guard, jargon flag names, help text missing required sections"
    diagnosed: "2026-04-29"
    resolution: "Migrated to node:util parseArgs(strict:true), added TTY guard + SIGINT cleanup, renamed --ci to --smoke (kept --ci as hidden alias), added --smoke-timeout-ms + PINBOARD_SMOKE_TIMEOUT_MS env + --no-color, rewrote help text with USAGE/FLAGS/EXAMPLES/LEARN MORE/FEEDBACK sections per rubric. Pinboard cli.tsx bumped to v0.2.0. Audit reference: app_docs/pinboard-cli-audit.md"
    affects: ["pinboard"]
