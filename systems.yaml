  task_types:
    - "social-post-generation"
    - "carousel-generation"
    - "brand-creative-editing"
    - "copy-to-creative"
  knowledge_path: "systems/post-board/knowledge"
  client_directory: "client"
  input_types:
    - "brief"
    - "copy-doc"
    - "reference-images"
    - "brand-package"
  output_types:
    - "editable-project-json"
    - "slide-png"
    - "carousel-pdf"
  domain_tags:
    - "social-media"
    - "creative"
    - "marketing"
    - "ai"
    - "editor"
  entry_point: "systems/post-board/src/cli.ts"
  justfile: true
  stages:
    - name: "copy-generation"
      produces: "On-brand post/carousel copy (cover hook, body slides, CTA) via copywriting/ad-creative/social-content/marketing-psychology, mapped to the brand voice + positioning banners"
    - name: "project-seeding"
      produces: "A populated draft Project document (format preset, style mode, slides with layers) persisted to client/dragonhearted_labs/post-board/<id>/project.json"
    - name: "cover-generation"
      produces: "A catchy cover slide — CSS riso composition by default, or an optional Higgsfield/ImageEngine-generated background with editable text on top"
