# Adcelerate System Registry
# Single source of truth for system discovery and routing.
# Only Build Mode registration and Diagnosis workflows write to this file.
# Execute Mode, validation, and platform management read from it.
#
# Schema Reference (from Architecture Decision 2a):
#   name: string (required) — Display name
#   path: string (required) — Relative path from monorepo root
#   status: enum (required) — building | active | degraded | broken
#   description: string (required) — Natural language description for NL fallback matching
#   task_types: string[] (required) — Structured capability tags for primary matching
#   knowledge_path: string (required) — Path to system's knowledge directory
#   input_types: string[] (optional) — What the system accepts
#   output_types: string[] (optional) — What the system produces
#   domain_tags: string[] (optional) — Domain categorization
#   entry_point: string (optional) — Main file path
#   justfile: boolean (optional) — Whether system has its own justfile
#   stages: object[] (optional) — Execute Mode stage definitions [{name, produces}]
#   registered_at: date (optional) — Registration timestamp
#   last_validated: date (optional) — Last successful validation

# System identifier is the kebab-case key (e.g., autocaption, pinboard)

autocaption:
  name: "autoCaption"
  path: "systems/autoCaption"
  status: "active"
  description: "Automated video captioning system using Whisper.cpp for transcription and Remotion for rendering TikTok-style word-highlighted captions onto vertical video"
  task_types:
    - "video-captioning"
    - "transcription"
    - "subtitle-generation"
  knowledge_path: "systems/autoCaption/knowledge"
  input_types:
    - "video-file"
  output_types:
    - "captioned-video"
    - "captions-json"
  domain_tags:
    - "video"
    - "ai"
    - "media-processing"
  entry_point: "systems/autoCaption/src/cli.ts"
  justfile: true
  stages:
    - name: "transcription"
      produces: "Caption[] array with word-level timestamps from Whisper.cpp"
    - name: "caption-styling"
      produces: "Validated CaptionStyle configuration via Zod schema"
    - name: "rendering"
      produces: "Final captioned MP4 video file (1080x1920, h264)"
  registered_at: "2026-03-25"
  last_validated: "2026-03-25"

scene-board:
  name: "SceneBoard"
  path: "systems/scene-board"
  status: "active"
  description: "CLI-driven storyboard creation system that transforms video briefs of any format into professional storyboards with scripts, timestamps, voice scripts, and NanoBanana Pro prompts for visual generation — leveraging marketing, sales, social media, and ads skills"
  task_types:
    - "storyboard-creation"
    - "script-generation"
    - "visual-prompt-generation"
    - "video-pre-production"
    - "client-management"
    - "pdf-generation"
  knowledge_path: "systems/scene-board/knowledge"
  client_directory: "systems/scene-board/clients"
  input_types:
    - "video-brief"
    - "script"
    - "reference-video-link"
    - "voice-script"
    - "raw-idea"
    - "brand-document"
    - "brand-guidelines"
  output_types:
    - "storyboard-document"
    - "nanobanana-pro-prompts"
    - "scene-breakdown"
    - "pdf-storyboard"
    - "client-brand-profile"
  domain_tags:
    - "video"
    - "creative"
    - "marketing"
    - "ai"
    - "storyboard"
  entry_point: "systems/scene-board/src/index.ts"
  justfile: true
  stages:
    - name: "brief-intake"
      produces: "Parsed brief with identified provided vs. missing components"
    - name: "context-gathering"
      produces: "Complete context: brand, audience, platform, goals, component confirmations"
    - name: "dynamic-generation-approval"
      produces: "Approved script, voice script, and other generated components"
    - name: "scene-breakdown"
      produces: "Scene-by-scene breakdown with timestamps (1 scene = 1 shot = 1 image)"
    - name: "visual-direction"
      produces: "Style Anchor document + per-scene visual direction"
    - name: "nanobanana-prompt-generation"
      produces: "Optimized NanoBanana Pro prompts per scene with reference image guidance"
    - name: "final-assembly"
      produces: "Complete professional storyboard document ready for client delivery"
  registered_at: "2026-03-26"
  last_validated: "2026-03-26"

pinboard:
  name: "Pinboard"
  path: "systems/pinboard"
  status: "active"
  description: "AI-powered image generation and reference board application with iterative workflow -- upload references, generate via Google Gemini/fal.ai, feed results back as references"
  task_types:
    - "image-generation"
    - "reference-management"
    - "visual-content"
  knowledge_path: "systems/pinboard/knowledge"
  input_types:
    - "images"
    - "text-prompt"
  output_types:
    - "generated-image"
    - "image-gallery"
  domain_tags:
    - "web-app"
    - "ai"
    - "image-generation"
    - "visual"
  entry_point: "systems/pinboard/server/src/index.ts"
  justfile: true
  stages:
    - name: "content-ingestion"
      produces: "Uploaded reference images stored in SQLite + uploads/ directory"
    - name: "image-generation"
      produces: "AI-generated image from prompt + reference images via provider registry"
    - name: "delivery"
      produces: "Rendered React web interface with generation history and reference gallery"
  registered_at: "2026-03-25"
  last_validated: "2026-03-25"

instagram-scrapper:
  name: "Instagram Scrapper"
  path: "systems/instagram-scrapper"
  status: "active"
  description: "Instagram content scraper that extracts posts, reels, and profile data using login-based Instagram Private API access with browser-automated authentication and media downloading"
  task_types:
    - "instagram-scraping"
    - "social-media-data-extraction"
    - "content-collection"
  knowledge_path: "systems/instagram-scrapper/knowledge"
  input_types:
    - "instagram-url"
    - "instagram-username"
  output_types:
    - "instagram-post-data"
    - "instagram-profile-data"
    - "media-urls"
    - "downloaded-media"
  domain_tags:
    - "social-media"
    - "scraping"
    - "data-extraction"
    - "instagram"
  entry_point: "systems/instagram-scrapper/src/cli.ts"
  justfile: true
  stages:
    - name: "authentication"
      produces: "Valid session cookies (csrftoken, sessionid, ds_user_id, mid) via browser login"
    - name: "url-parsing"
      produces: "Parsed Instagram URL with type (profile/post/reel) and identifier"
    - name: "data-extraction"
      produces: "Raw scraped data from Instagram Private API with authenticated session"
    - name: "data-normalization"
      produces: "Structured InstagramPost[] and InstagramProfile data with media versions"
    - name: "media-download"
      produces: "Downloaded media files (images/videos) to local filesystem"
  registered_at: "2026-03-30"
  last_validated: "2026-04-10"
