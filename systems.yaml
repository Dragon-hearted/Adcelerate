# Adcelerate System Registry
# Single source of truth for system discovery and routing.
# Only Build Mode registration and Diagnosis workflows write to this file.
# Execute Mode, validation, and platform management read from it.
#
# Schema Reference (from Architecture Decision 2a):
#   name: string (required) — Display name
#   path: string (required) — Relative path from monorepo root
#   status: enum (required) — building | active | degraded | broken
#   description: string (required) — Natural language description for NL fallback matching
#   task_types: string[] (required) — Structured capability tags for primary matching
#   knowledge_path: string (required) — Path to system's knowledge directory
#   input_types: string[] (optional) — What the system accepts
#   output_types: string[] (optional) — What the system produces
#   domain_tags: string[] (optional) — Domain categorization
#   entry_point: string (optional) — Main file path
#   justfile: boolean (optional) — Whether system has its own justfile
#   stages: object[] (optional) — Execute Mode stage definitions [{name, produces}]
#   registered_at: date (optional) — Registration timestamp
#   last_validated: date (optional) — Last successful validation

# System identifier is the kebab-case key (e.g., autocaption, pinboard)

autocaption:
  name: "autoCaption"
  path: "systems/autoCaption"
  status: "active"
  description: "Word-highlighted caption renderer for vertical video. Whisper.cpp transcribes the audio, Remotion paints TikTok-style overlays back on top, and a CLI ties it all together."
  task_types:
    - "video-captioning"
    - "transcription"
    - "subtitle-generation"
  knowledge_path: "systems/autoCaption/knowledge"
  input_types:
    - "video-file"
  output_types:
    - "captioned-video"
    - "captions-json"
  domain_tags:
    - "video"
    - "ai"
    - "media-processing"
  entry_point: "systems/autoCaption/src/cli.ts"
  justfile: true
  stages:
    - name: "transcription"
      produces: "Caption[] array with word-level timestamps from Whisper.cpp"
    - name: "caption-styling"
      produces: "Validated CaptionStyle configuration via Zod schema"
    - name: "rendering"
      produces: "Final captioned MP4 video file (1080x1920, h264)"
  registered_at: "2026-03-25"
  last_validated: "2026-03-25"

scene-board:
  name: "SceneBoard"
  path: "systems/scene-board"
  status: "active"
  description: "Brief-to-storyboard CLI for short-form video. Turns rough scripts and references into a composite multi-panel storyboard SHEET image (≤15s per sheet, GPT Image 2 via the Higgsfield CLI with ImageEngine fallback) plus a Phase 2 cinematic video prompt — with 4-view character/product reference sheets and timecoded panels."
  task_types:
    - "storyboard-creation"
    - "script-generation"
    - "visual-prompt-generation"
    - "composite-sheet-generation"
    - "reference-sheet-generation"
    - "video-prompt-generation"
    - "video-pre-production"
    - "client-management"
    - "pdf-generation"
  knowledge_path: "systems/scene-board/knowledge"
  client_directory: "client"
  input_types:
    - "video-brief"
    - "script"
    - "reference-video-link"
    - "voice-script"
    - "raw-idea"
    - "brand-document"
    - "brand-guidelines"
    - "character-reference-images"
    - "product-reference-images"
    - "garment-selection"
  output_types:
    - "storyboard-document"
    - "storyboard-sheet-image"
    - "character-reference-sheet"
    - "product-reference-sheet"
    - "cinematic-video-prompt"
    - "scene-breakdown"
    - "pdf-storyboard"
    - "client-brand-profile"
  domain_tags:
    - "video"
    - "creative"
    - "marketing"
    - "ai"
    - "storyboard"
  # Skill-driven system: invoked via the scene-board skill (see SKILL.md), not a standalone CLI.
  # The real runnable modules are src/cli.ts and src/composite-storyboard.ts; the package.json
  # "storyboard" script and justfile storyboard/sheet recipes are intentionally guidance-only.
  entry_point: "systems/scene-board/src/index.ts"
  justfile: true
  stages:
    - name: "input-analysis"
      produces: "Parsed brief with identified provided vs. missing components and brand_category"
    - name: "context-gathering"
      produces: "Complete context: brand, audience, platform, goals, component confirmations"
    - name: "dynamic-generation-approval"
      produces: "Approved script, voice script, and other generated components"
    - name: "scene-breakdown"
      produces: "Panel breakdown with variable-duration timecodes (≤15s per sheet)"
    - name: "visual-direction"
      produces: "Style Anchor document + per-panel visual direction"
    - name: "reference-sheets"
      produces: "4-view character/product reference sheets (Higgsfield → ImageEngine fallback), routed by brand_category"
    - name: "phase1-sheet"
      produces: "Composite multi-panel storyboard sheet image per ≤15s block (GPT Image 2) + the Phase 1 prompt and panel/timecode table"
    - name: "phase2-video"
      produces: "Cinematic video prompt (per-shot timecode, camera, dialogue, SFX, fixed Audio line)"
    - name: "final-assembly"
      produces: "Complete professional storyboard markdown + PDF ready for client delivery"
  registered_at: "2026-03-26"
  last_validated: "2026-05-29"

