      <feFlood flood-color="#EF4444" flood-opacity="0.35" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="pipe-arrow" viewBox="0 0 10 6" refX="10" refY="3"
