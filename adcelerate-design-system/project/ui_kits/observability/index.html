<!doctype html>
<html lang="en" class="theme-paper">
<head>
<meta charset="utf-8">
<title>Multi-Agent Observability</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--theme-bg-secondary);
    color: var(--theme-text-primary);
    font-size: 14px;
  }
  button { font-family: inherit; cursor: pointer; }

  /* Connection pill */
  .pill-conn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500;
    border: 1px solid;
  }
  .pill-ok {
    background: color-mix(in srgb, var(--theme-accent-success) 10%, transparent);
    border-color: color-mix(in srgb, var(--theme-accent-success) 30%, transparent);
    color: var(--theme-accent-success);
  }
  .pill-err {
    background: color-mix(in srgb, var(--theme-accent-error) 10%, transparent);
    border-color: color-mix(in srgb, var(--theme-accent-error) 30%, transparent);
    color: var(--theme-accent-error);
  }
  .pulse-wrap { position: relative; display: inline-flex; width: 8px; height: 8px; }
  .pulse-ping {
    position: absolute; inset: 0; border-radius: 9999px;
    background: currentColor; opacity: .6;
    animation: ping 1.6s cubic-bezier(0, 0, 0.2, 1) infinite;
  }
  .pulse-dot {
    position: relative; width: 8px; height: 8px;
    border-radius: 9999px; background: currentColor;
  }
  @keyframes ping { 75%,100% { transform: scale(2.2); opacity: 0; } }

  /* Toolbar */
  .count-pill {
    font-size: 11px; font-weight: 500;
    color: var(--theme-text-secondary);
    background: var(--theme-bg-tertiary);
    padding: 4px 10px; border-radius: 9999px;
    font-variant-numeric: tabular-nums;
  }
  .tb-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 6px;
    font-size: 13px; font-weight: 500;
    color: var(--theme-text-secondary);
    background: var(--theme-bg-secondary);
    border: 1px solid var(--theme-border-primary);
    transition: var(--theme-transition);
  }
  .tb-btn:hover {
    color: var(--theme-text-primary);
    background: var(--theme-bg-tertiary);
  }
  .tb-btn-on {
    color: var(--theme-primary);
    background: color-mix(in srgb, var(--theme-primary) 10%, transparent);
    border-color: color-mix(in srgb, var(--theme-primary) 30%, transparent);
  }

  /* Filters */
  .filter-select {
    background: var(--theme-bg-secondary);
    color: var(--theme-text-primary);
    border: 1px solid var(--theme-border-primary);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
  }
  .filter-select:focus {
    outline: 2px solid var(--theme-focus-ring);
    outline-offset: 0;
  }

  /* Live pulse */
  .range-btn {
    font-size: 11px; font-weight: 500;
    padding: 4px 10px; border-radius: 4px; border: none;
    background: transparent;
    color: var(--theme-text-tertiary);
  }
  .range-btn-on {
    background: var(--theme-bg-primary);
    color: var(--theme-text-primary);
    box-shadow: 0 1px 2px var(--theme-shadow);
  }

  /* Event row */
  .event-row {
    position: relative;
    background: var(--theme-bg-primary);
    border: 1px solid var(--theme-border-secondary);
    border-radius: 8px;
    padding: 10px 12px;
    transition: var(--theme-transition);
  }
  .event-row:hover {
    background: color-mix(in srgb, var(--theme-bg-primary) 85%, var(--theme-bg-tertiary));
  }
  .chip-agent {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500;
    padding: 2px 6px; border-radius: 4px;
    background: var(--theme-bg-tertiary);
    color: var(--theme-text-secondary);
    border: 1px solid var(--theme-border-primary);
  }
  .payload-json {
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--theme-text-secondary);
    background: var(--theme-bg-secondary);
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--theme-border-primary);
    overflow-x: auto;
  }

  /* HITL */
  .hitl-btn {
    font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: 6px; border: none;
    transition: var(--theme-transition);
  }
  .hitl-deny {
    background: transparent;
    color: var(--theme-accent-error);
    border: 1.5px solid var(--theme-accent-error);
    font-weight: 600;
  }
  .hitl-deny:hover { background: color-mix(in srgb, var(--theme-accent-error) 10%, transparent); }
  .hitl-approve {
    background: var(--theme-accent-success);
    color: var(--theme-bg-secondary);
    border: 1.5px solid var(--theme-accent-success);
    font-weight: 600;
  }
  .hitl-approve:hover { filter: brightness(0.9); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 50;
    background: color-mix(in srgb, var(--theme-text-primary) 40%, transparent);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal {
    width: 520px; max-width: 100%; max-height: 80vh;
    background: var(--theme-bg-primary);
    border: 1px solid var(--theme-border-primary);
    border-radius: 12px;
    box-shadow: 0 10px 30px var(--theme-shadow-lg);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .modal-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--theme-border-primary);
  }
  .modal-close {
    width: 28px; height: 28px; border-radius: 6px;
    border: none;
    color: var(--theme-text-tertiary);
    background: transparent;
  }
  .modal-close:hover {
    background: var(--theme-bg-tertiary);
    color: var(--theme-text-primary);
  }
  .modal-body { padding: 14px 16px; overflow: auto; }

  .theme-card {
    background: var(--theme-bg-secondary);
    border: 1px solid var(--theme-border-primary);
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    transition: var(--theme-transition);
  }
  .theme-card:hover {
    background: var(--theme-bg-tertiary);
    border-color: var(--theme-border-secondary);
  }
  .theme-card-on {
    border-color: var(--theme-primary);
    box-shadow: 0 0 0 1px var(--theme-primary);
  }

  /* Spinner */
  .anim-spin { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--theme-bg-tertiary);
    border-radius: 5px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--theme-border-secondary); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="mockData.js"></script>
<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="FilterPanel.jsx"></script>
<script type="text/babel" src="LivePulseChart.jsx"></script>
<script type="text/babel" src="EventRow.jsx"></script>
<script type="text/babel" src="HITLCard.jsx"></script>
<script type="text/babel" src="EventTimeline.jsx"></script>
<script type="text/babel" src="ThemeManager.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

</body>
</html>
