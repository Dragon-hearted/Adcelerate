<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glow-0" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"></feGaussianBlur>
      <feFlood flood-color="#6366F1" flood-opacity="0.35" result="color"></feFlood>
      <feComposite in="color" in2="blur" operator="in" result="glow"></feComposite>
      <feMerge>
        <feMergeNode in="glow"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    <filter id="breathe-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"></feGaussianBlur>
      <feFlood flood-color="#6366F1" flood-opacity="0.25" result="color"></feFlood>
      <feComposite in="color" in2="blur" operator="in" result="glow"></feComposite>
      <feMerge>
        <feMergeNode in="glow"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>
  <g opacity="0">
    
    <text x="400" y="72" text-anchor="middle" fill="#E0E0E0" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" filter="url(#glow-0)">Adcelerate</text>
  </g>
  <line x1="340" y1="96" x2="460" y2="96" stroke="#6366F1" stroke-width="2" stroke-linecap="round" opacity="0">
    
  </line>
  <g opacity="0">
    
    <text x="400" y="130" text-anchor="middle" fill="#9CA3AF" font-family="Inter, system-ui, sans-serif" font-size="15">AI-Powered Marketing &amp; Media Platform</text>
  </g>
</svg>