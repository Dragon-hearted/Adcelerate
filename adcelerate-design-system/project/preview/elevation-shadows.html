<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#EEE6D4;color:#1A1714;font-family:var(--font-sans)}
  body{
    background-image:
      radial-gradient(rgba(26,23,20,.12) 1px, transparent 1px),
      repeating-linear-gradient(0deg, rgba(26,23,20,.03) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at 30% 20%, #F5EEDC 0%, #EEE6D4 50%, #E6DCC6 100%);
    background-size: 3px 3px, 100% 3px, 100% 100%;
    padding:20px;display:flex;gap:18px;align-items:center;justify-content:center;flex-wrap:wrap;
  }
  .card{
    width:140px;height:84px;background:#F5EEDC;border-radius:6px;border:1.5px solid #1A1714;
    padding:9px 11px;display:flex;flex-direction:column;justify-content:space-between;
    font-family:var(--font-mono);font-size:10px;color:#6B5F4F;
  }
  .card .lbl{font-weight:700;color:#1A1714;font-size:11px;letter-spacing:.02em}
  .card .val{font-size:9px;color:#8B2A1D;letter-spacing:.04em}

  /* Oxblood offset — screen-print style, no blur */
  .s-1{box-shadow:2px 2px 0 #1A1714}
  .s-2{box-shadow:4px 4px 0 #8B2A1D}
  .s-3{box-shadow:3px 3px 0 #1A1714, 6px 6px 0 #8B2A1D}
  .s-focus{box-shadow:0 0 0 2px #EEE6D4, 0 0 0 4px #8B2A1D}
</style></head>
<body>
  <div class="card s-1"><span class="lbl">flat</span><span class="val">2px ink</span></div>
  <div class="card s-2"><span class="lbl">raised</span><span class="val">4px oxblood</span></div>
  <div class="card s-3"><span class="lbl">stacked</span><span class="val">ink + oxblood</span></div>
  <div class="card s-focus"><span class="lbl">focus</span><span class="val">2px ring</span></div>
</body></html>
