<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F2EDE3;color:#1A1714;font-family:var(--font-sans)}
  .wrap{padding:14px 18px;display:flex;flex-direction:column;gap:4px;font-family:var(--font-mono);font-size:12px}

  .row{
    display:grid;grid-template-columns:96px 1fr auto;align-items:center;gap:14px;
    padding:7px 10px;border-bottom:1px dashed rgba(26,23,20,.12);
  }
  .row:last-child{border-bottom:0}
  .spec{color:#8B2A1D;font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:700}
  .val{font-size:13px;color:#1A1714;min-width:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .hex{color:#A89884;font-size:10px;letter-spacing:.04em}

  /* distinct tag styles — solid pill per semantic group */
  .t{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;letter-spacing:.01em}

  .t-time    {color:#1A1714;background:transparent;font-family:var(--font-mono);font-size:15px;font-variant-numeric:tabular-nums;padding:0;font-weight:700;letter-spacing:-.01em}
  .t-time .ms{color:#8B2A1D;font-size:12px;font-weight:600}

  .t-session {color:#F2EDE3;background:#1A1714;font-weight:700;letter-spacing:.02em;padding:3px 9px;font-size:12px}  /* ink pill */
  .t-model   {color:#F2EDE3;background:#0F5C3E}                          /* deep green */
  .t-model .d{width:5px;height:5px;border-radius:9999px;background:currentColor}

  .t-hook    {color:#F2EDE3;background:#8B2A1D}                          /* oxblood */
  .t-tool    {color:#1A1714;background:transparent;border:1.5px solid #1A1714;padding:1px 7px} /* outline ink */

  .t-app-a   {color:#F2EDE3;background:#7A2519}                          /* oxblood */
  .t-app-b   {color:#F2EDE3;background:#1E5A7A}                          /* petrol */

  .t-err     {color:#F2EDE3;background:#8B2A1D}
  .t-err::before{content:"!";margin-right:4px;font-weight:700}
</style></head>
<body><div class="wrap">

  <div class="row">
    <span class="spec">time</span>
    <span class="val"><span class="t t-time">14:32:07<span class="ms">.284</span></span></span>
    <span class="hex">#1A1714</span>
  </div>

  <div class="row">
    <span class="spec">session</span>
    <span class="val"><span class="t t-session">7f0f56d2</span></span>
    <span class="hex">#1A1714</span>
  </div>

  <div class="row">
    <span class="spec">model</span>
    <span class="val"><span class="t t-model"><span class="d"></span>claude-sonnet-4-5</span></span>
    <span class="hex">#0F5C3E</span>
  </div>

  <div class="row">
    <span class="spec">hook</span>
    <span class="val"><span class="t t-hook">PostToolUse</span><span class="t t-hook" style="background:#B33D2E">UserPromptSubmit</span></span>
    <span class="hex">#8B2A1D</span>
  </div>

  <div class="row">
    <span class="spec">tool</span>
    <span class="val"><span class="t t-tool">Bash</span><span class="t t-tool">Read</span><span class="t t-tool">WebFetch</span></span>
    <span class="hex">outline</span>
  </div>

  <div class="row">
    <span class="spec">app</span>
    <span class="val"><span class="t t-app-a">pinboard</span><span class="t t-app-b">instagram-scrapper</span></span>
    <span class="hex">hashed hsl</span>
  </div>

  <div class="row">
    <span class="spec">error</span>
    <span class="val"><span class="t t-err">403 WebFetch instagram.com</span></span>
    <span class="hex">#8B2A1D</span>
  </div>

</div></body></html>
