<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#EEE6D4;color:#2A241E;font-family:var(--font-sans)}
  body{
    background-image:
      radial-gradient(rgba(26,23,20,.10) 1px, transparent 1px),
      repeating-linear-gradient(0deg, rgba(26,23,20,.025) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at 30% 20%, #F5EEDC 0%, #EEE6D4 50%, #E6DCC6 100%);
    background-size:3px 3px, 100% 3px, 100% 100%;
    padding:14px 18px;
  }
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .cell{background:#F5EEDC;border:1px solid rgba(42,36,30,.3);border-radius:3px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;color:#2A241E;box-shadow:2px 2px 0 rgba(26,23,20,.15)}
  svg{width:20px;height:20px;color:#1A1714}
  .lbl{font-family:var(--font-mono);font-size:9px;color:#6B5F4F;font-weight:600;letter-spacing:.04em}
  .foot{margin-top:10px;color:#6B5F4F;font-size:10px;font-family:var(--font-mono);letter-spacing:.1em;text-transform:uppercase}
  .foot::before{content:"§ ";color:#8B2A1D}
</style></head>
